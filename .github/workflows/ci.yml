name: CI
on: [push, pull_request]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
      - run: npm ci
      - name: Secret scan (gitleaks)
        run: docker run --rm -v "$PWD:/repo" -w /repo zricethezav/gitleaks:latest detect --source . --verbose --redact
      # Fails the build only on CRITICAL advisories. Not `high`: the current
      # high-severity advisories are all rooted in Next.js itself and its
      # transitive deps (next/sharp/postcss) with no fix available short of a
      # major framework bump, so gating on `high` would make CI permanently
      # red for issues we can't action. Revisit the threshold when Next ships
      # a patched release in-range.
      - name: Dependency audit (critical only)
        run: npm audit --audit-level=critical
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run test
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npx playwright test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          MPESA_CONSUMER_KEY: ${{ secrets.MPESA_CONSUMER_KEY }}
          MPESA_CONSUMER_SECRET: ${{ secrets.MPESA_CONSUMER_SECRET }}
          MPESA_PASSKEY: ${{ secrets.MPESA_PASSKEY }}
          MPESA_SHORTCODE: ${{ secrets.MPESA_SHORTCODE }}
          MPESA_CALLBACK_URL: ${{ secrets.MPESA_CALLBACK_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          DEMO_API_KEY: ${{ secrets.DEMO_API_KEY }}
